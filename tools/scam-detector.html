<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>AI Scam Detector</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
}

.container{
background:white;
max-width:720px;
width:100%;
padding:35px;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

h1{
margin:0 0 8px 0;
font-size:30px;
}

.subtitle{
color:#666;
margin-bottom:25px;
}

textarea{
width:100%;
height:150px;
border-radius:10px;
border:1px solid #e5e7eb;
padding:14px;
font-size:15px;
resize:none;
outline:none;
}

textarea:focus{
border-color:#6366f1;
}

button{
background:#6366f1;
color:white;
border:none;
padding:11px 18px;
border-radius:8px;
cursor:pointer;
font-weight:600;
margin-top:15px;
}

button:hover{
background:#4f46e5;
}

.result{
margin-top:25px;
background:#f9fafb;
border:1px solid #eee;
border-radius:10px;
padding:16px;
min-height:70px;
line-height:1.6;
}

.copy-btn{
background:#10b981;
margin-top:10px;
}

.copy-btn:hover{
background:#059669;
}

.examples{
margin-top:12px;
font-size:13px;
color:#666;
}

.example{
cursor:pointer;
color:#6366f1;
}

.example:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Scam Detector</h1>

<p class="subtitle">
Paste a suspicious message or email and detect if it could be a scam.
</p>

<textarea id="input" placeholder="Paste suspicious message here..."></textarea>

<div class="examples">
Example:
<span class="example" onclick="fillExample()">
"Your bank account will be blocked. Click this link now to verify."
</span>
</div>

<button onclick="checkScam()">Analyze Message</button>

<div id="result" class="result">
AI analysis will appear here.
</div>

<button class="copy-btn" onclick="copyResult()">Copy</button>

</div>

<script>

function fillExample(){
document.getElementById("input").value =
"Your bank account will be blocked. Click this link immediately to verify.";
}

async function checkScam(){

const text=document.getElementById("input").value;

if(!text){
document.getElementById("result").innerText="Please paste a message first.";
return;
}

document.getElementById("result").innerText="Analyzing...";

try{

const res=await fetch("/api/scam",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

const data=await res.json();

document.getElementById("result").innerText=data.result || "No analysis returned.";

}catch(err){

document.getElementById("result").innerText="Error contacting AI service.";

}

}

function copyResult(){

const text=document.getElementById("result").innerText;
navigator.clipboard.writeText(text);
alert("Copied");

}

</script>

</body>

</html>
