<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<title>Scam Detector</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
}

.container{
background:white;
max-width:760px;
width:100%;
padding:40px;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

h1{
margin:0;
font-size:32px;
}

.subtitle{
color:#666;
margin-top:8px;
margin-bottom:30px;
}

textarea{
width:100%;
height:150px;
border-radius:10px;
border:1px solid #e5e7eb;
padding:14px;
font-size:15px;
resize:none;
outline:none;
}

textarea:focus{
border-color:#6366f1;
}

button{
margin-top:20px;
background:#6366f1;
color:white;
border:none;
padding:12px 22px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#4f46e5;
}

.result{
margin-top:30px;
background:#f9fafb;
border:1px solid #eee;
border-radius:10px;
padding:18px;
min-height:80px;
line-height:1.6;
}

.copy{
background:#10b981;
margin-top:12px;
}

.copy:hover{
background:#059669;
}

.warning{
margin-top:10px;
font-size:13px;
color:#888;
}

</style>

</head>

<body>

<div class="container">

<h1>Scam Detector</h1>

<p class="subtitle">
Paste suspicious messages, emails or links and detect potential scams.
</p>

<textarea id="input" placeholder="Example: Your bank account will be locked. Click this link to verify now..."></textarea>

<button onclick="detectScam()">Analyze Message</button>

<div id="result" class="result">
AI scam analysis will appear here.
</div>

<button class="copy" onclick="copyResult()">Copy</button>

<p class="warning">
⚠ Always verify with official sources before sharing personal data.
</p>

</div>

<script>

async function detectScam(){

const text=document.getElementById("input").value;

if(!text){

document.getElementById("result").innerText="Please enter a message.";

return;

}

document.getElementById("result").innerText="Analyzing message...";

try{

const res=await fetch("/api/scam",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({message:text})

});

const data=await res.json();

document.getElementById("result").innerText=data.result || "No analysis returned.";

}catch(err){

document.getElementById("result").innerText="Error contacting AI service.";

}

}

function copyResult(){

const text=document.getElementById("result").innerText;

navigator.clipboard.writeText(text);

alert("Copied");

}

</script>

</body>

</html>
