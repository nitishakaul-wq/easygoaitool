<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ATS Resume & Cover Letter – Tailored to Job Description | EasyGo Tools</title>
  <meta name="description" content="Paste the job description and your resume. Get an ATS-optimized resume, matching cover letter, and improvement tips. Free.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f12;
      --bg-soft: #18181c;
      --surface: #1e1e24;
      --surface-2: #26262c;
      --border: rgba(255,255,255,0.08);
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --accent: #a855f7;
      --accent-2: #c084fc;
      --pop: #22d3ee;
      --success: #22c55e;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-full: 9999px;
      --space: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(15, 15, 18, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px max(var(--space-md), env(safe-area-inset-left)) 12px max(var(--space-md), env(safe-area-inset-right));
    }
    .top-bar-inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9375rem;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: var(--radius-full);
      transition: color 0.2s, background 0.2s;
    }
    .back-link:hover { color: var(--accent-2); background: var(--surface); }
    .back-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: var(--space-xl) var(--space-md) 48px;
      padding-left: max(var(--space-md), env(safe-area-inset-left));
      padding-right: max(var(--space-md), env(safe-area-inset-right));
    }

    header { margin-bottom: var(--space-xl); }
    .badge {
      display: inline-block;
      padding: 6px 14px;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(34, 211, 238, 0.15));
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: var(--radius-full);
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--accent-2);
      margin-bottom: var(--space-md);
    }
    h1 {
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 1.0625rem;
      margin: 0;
      max-width: 520px;
      line-height: 1.6;
    }

    .form-section {
      margin-bottom: var(--space-lg);
    }
    .form-section label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      min-height: 140px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.9375rem;
      font-family: inherit;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea::placeholder { color: var(--text-muted); }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
    }

    .btn-row { margin-top: var(--space-lg); }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      min-height: 48px;
    }
    .btn-primary:hover { opacity: 0.95; transform: scale(1.02); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-primary .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-wrap {
      margin-top: var(--space-xl);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--border);
    }
    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 12px;
    }
    .result-head label {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .btn-copy {
      padding: 8px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      min-height: 44px;
    }
    .btn-copy:hover { background: var(--surface); border-color: var(--accent); color: var(--accent-2); }
    .btn-copy:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn-copy.copied { background: rgba(34, 197, 94, 0.15); border-color: var(--success); color: var(--success); }

    .result-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-lg);
      min-height: 160px;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 0.9375rem;
      line-height: 1.65;
      color: var(--text);
    }
    .result-box.placeholder { color: var(--text-muted); font-style: italic; }
    .result-box.loading { color: var(--text-muted); }
    .result-box.error { border-color: rgba(239, 68, 68, 0.4); color: #fca5a5; }

    @media (max-width: 600px) {
      .container { padding: 20px 16px 40px; }
      textarea { min-height: 120px; font-size: 16px; }
      .btn-primary { width: 100%; }
    }
  </style>
</head>
<body>
  <nav class="top-bar" aria-label="Navigation">
    <div class="top-bar-inner">
      <a href="/" class="back-link">← Back to tools</a>
    </div>
  </nav>

  <div class="container">
    <header>
      <span class="badge">Tailored to the JD</span>
      <h1>ATS Resume & Cover Letter</h1>
      <p class="subtitle">Drop the job description + your resume. Get an ATS-friendly version, matching cover letter, and tips. Job apps on easy mode.</p>
    </header>

    <div class="form-section">
      <label for="jd">Job description</label>
      <textarea id="jd" placeholder="Paste the full job description here..."></textarea>
    </div>

    <div class="form-section">
      <label for="resume">Your current resume</label>
      <textarea id="resume" placeholder="Paste your resume text here..."></textarea>
    </div>

    <div class="btn-row">
      <button type="button" class="btn-primary" id="btnGenerate" onclick="optimizeResume()">
        <span id="btnText">Generate ATS Resume</span>
      </button>
    </div>

    <div class="result-wrap">
      <div class="result-head">
        <label for="result">Result</label>
        <button type="button" class="btn-copy" id="btnCopy" onclick="copyResult()" disabled>Copy</button>
      </div>
      <div id="result" class="result-box placeholder" role="status" aria-live="polite">
        Results will appear here after you generate.
      </div>
    </div>
  </div>

  <script>
    function getResultEl() { return document.getElementById('result'); }
    function getBtnGenerate() { return document.getElementById('btnGenerate'); }
    function getBtnCopy() { return document.getElementById('btnCopy'); }

    function setResult(html, className) {
      var el = getResultEl();
      el.innerHTML = html;
      el.className = 'result-box' + (className ? ' ' + className : '');
    }

    function setResultText(text, className) {
      setResult(document.createTextNode(text).textContent, className);
    }

    async function optimizeResume() {
      var jd = document.getElementById('jd').value.trim();
      var resume = document.getElementById('resume').value.trim();

      if (!jd || !resume) {
        setResultText('Please paste both the job description and your resume.', 'error');
        return;
      }

      var btn = getBtnGenerate();
      var btnText = document.getElementById('btnText');
      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span> Analyzing & generating...';
      setResult('Analyzing your resume and the job description…\n\nGenerating ATS-optimized version, cover letter, and suggestions.', 'loading');
      getBtnCopy().disabled = true;

      try {
        var res = await fetch('/api/resume', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jd: jd, resume: resume })
        });
        var data = await res.json();

        if (data.error) {
          setResultText(data.error, 'error');
          return;
        }

        var text = data.result || '';
        setResultText(text || 'No result returned.');
        getBtnCopy().disabled = !text;
      } catch (err) {
        setResultText('Error contacting the AI service. Check your connection and try again.', 'error');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Generate ATS Resume';
      }
    }

    function copyResult() {
      var text = getResultEl().textContent;
      if (!text || getResultEl().classList.contains('placeholder')) return;
      navigator.clipboard.writeText(text).then(function() {
        var btn = getBtnCopy();
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>
</body>
</html>
