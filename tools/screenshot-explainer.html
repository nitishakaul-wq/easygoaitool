<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Screenshot Explainer</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
}

.container{
background:white;
max-width:760px;
width:100%;
padding:40px;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

h1{
margin:0;
font-size:32px;
}

.subtitle{
color:#666;
margin-top:8px;
margin-bottom:30px;
}

.upload-box{

border:2px dashed #d1d5db;
border-radius:12px;
padding:40px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.upload-box:hover{
border-color:#6366f1;
background:#fafaff;
}

.upload-box p{
margin:10px 0;
color:#555;
}

.upload-icon{
font-size:40px;
}

.preview{
margin-top:20px;
max-width:100%;
border-radius:8px;
display:none;
}

button{
margin-top:20px;
background:#6366f1;
color:white;
border:none;
padding:12px 22px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#4f46e5;
}

.result{
margin-top:30px;
background:#f9fafb;
border:1px solid #eee;
border-radius:10px;
padding:18px;
min-height:80px;
line-height:1.6;
}

.copy{
background:#10b981;
margin-top:12px;
}

.copy:hover{
background:#059669;
}

</style>

</head>

<body>

<div class="container">

<h1>Screenshot Explainer</h1>

<p class="subtitle">
Upload a screenshot of an error, message, or UI problem and get an explanation instantly.
</p>

<label class="upload-box">

<div class="upload-icon">📷</div>

<p>Click to upload screenshot</p>

<p style="font-size:13px;color:#888;">
PNG, JPG supported
</p>

<input type="file" id="imageUpload" hidden>

</label>

<img id="preview" class="preview">

<button onclick="explainScreenshot()">Explain Screenshot</button>

<div id="result" class="result">
AI explanation will appear here.
</div>

<button class="copy" onclick="copyResult()">Copy</button>

</div>

<script>

const upload=document.getElementById("imageUpload");
const preview=document.getElementById("preview");

document.querySelector(".upload-box").onclick=()=>{
upload.click();
};

upload.onchange=e=>{

const file=e.target.files[0];

if(!file)return;

preview.src=URL.createObjectURL(file);
preview.style.display="block";

};

async function explainScreenshot(){

document.getElementById("result").innerText="Analyzing screenshot...";

try{

const res=await fetch("/api/explain-image",{method:"POST"});

const data=await res.json();

document.getElementById("result").innerText=data.result || "No explanation returned.";

}catch(err){

document.getElementById("result").innerText="Error contacting AI service.";

}

}

function copyResult(){

const text=document.getElementById("result").innerText;

navigator.clipboard.writeText(text);

alert("Copied");

}

</script>

</body>
</html>
